services:
  gotty:
    build:
      context: ..
    image: modenaf360/gotty-docker:latest
    ports:
      - "8993:8080"
    environment:
      GOTTY_USER: gotty
      GOTTY_PASSWORD: ${GOTTY_PASSWORD:?Set GOTTY_PASSWORD before starting this sample}
      GOTTY_COMMAND: /bin/bash -l
      GOTTY_PERMIT_WRITE: "true"
      GOTTY_RECONNECT: "true"
      GOTTY_TLS: "true"
      GOTTY_TLS_CRT: /certs/gotty.crt
      GOTTY_TLS_KEY: /certs/gotty.key
      GOTTY_TITLE_FORMAT: "GoTTY Docker - TLS"
    volumes:
      - ./certs:/certs:ro
    stdin_open: true
    tty: true
