name: Publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

env:
  IMAGE_NAME: modenaf360/gotty-docker
  LEGACY_IMAGE_NAME: modenaf360/gotty
  GOTTY_VERSION: v1.8.0
  UBUNTU_VERSION: ubuntu26.04

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            GOTTY_VERSION=${{ env.GOTTY_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.GOTTY_VERSION }}-${{ env.UBUNTU_VERSION }}
            ${{ env.LEGACY_IMAGE_NAME }}:latest
            ${{ env.LEGACY_IMAGE_NAME }}:${{ env.GOTTY_VERSION }}-${{ env.UBUNTU_VERSION }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
