name: Publish Docker image

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: modenaf360/gotty-docker
  LEGACY_IMAGE_NAME: modenaf360/gotty
  GOTTY_VERSION: v1.8.0
  UBUNTU_VERSION: ubuntu26.04
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Skip publish when Docker Hub secrets are missing
        if: ${{ env.DOCKERHUB_USERNAME == '' || env.DOCKERHUB_TOKEN == '' }}
        run: |
          echo "::notice::Skipping Docker Hub publish. Set DOCKERHUB_USERNAME and DOCKERHUB_TOKEN repository secrets to enable automatic publishing."

      - name: Set up QEMU
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          build-args: |
            GOTTY_VERSION=${{ env.GOTTY_VERSION }}
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.GOTTY_VERSION }}-${{ env.UBUNTU_VERSION }}
            ${{ env.LEGACY_IMAGE_NAME }}:latest
            ${{ env.LEGACY_IMAGE_NAME }}:${{ env.GOTTY_VERSION }}-${{ env.UBUNTU_VERSION }}
          labels: |
            org.opencontainers.image.title=gotty-docker
            org.opencontainers.image.description=A modern GoTTY web terminal container with optional Basic Auth.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.version=${{ env.GOTTY_VERSION }}-${{ env.UBUNTU_VERSION }}
